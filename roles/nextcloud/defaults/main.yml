---
nextcloud_enabled: false
nextcloud_available_externally: true

# directories
nextcloud_data_directory: "{{ docker_home }}/nextcloud"
nextcloud_storage_directory: "{{ ansible_nas_storage_volume }}/nextcloud"

# network
nextcloud_port: "8080"
nextcloud_hostname: "nextcloud"
nextcloud_network_name: "nextcloud"

# docker
nextcloud_container_name: "nextcloud"
nextcloud_image_name: "nextcloud"
nextcloud_image_version: "stable"
nextcloud_db_container_name: "nextcloud-db"
nextcloud_db_image_name: "mysql"
nextcloud_db_image_version: "8.3"

# specs
nextcloud_memory: 2g
nextcloud_db_memory: 2g

# How often (in minutes) to rescan external storage mounts (e.g. Samba shares)
# for changes made outside Nextcloud. Disabled (0) by default because even an
# "unchanged" scan has to stat() every directory in the tree, which can spin
# up drives configured to spin down for power saving. Set this to a positive
# number (e.g. 60) to enable periodic scanning, or trigger scans manually/on
# demand instead - see the Nextcloud docs page for details.
nextcloud_external_storage_scan_minutes: 0
